<!DOCTYPE html>
<html>
    <head>
        <title>
            Form creation in html
        </title>
    </head>
    <body>
        <h1>Personal Details Form</h1>
        <form>
            <label>Name:</label><br>
            <input type="text" id="Name"><br><br>
            <label>Email ID:</label><br>
            <input type="email" id="email"><br><br>
            <label>Birthday:</label><br>
            <input type="date" id="birthday"><br><br>
            <label>Password:</label><br>
            <input type="password" id="Password"><br><br>
            <label>Gender:</label><br>
            <input type="radio"  id="gender" value="female">Female<br>
            <input type="radio" id="gender" value="male">male<br><br>
            <fieldset>
                <legend>My selection</legend>
                <label>Select hobby</label><br>
                <select name="hobby" id="hobby">
                    <option value="cricket">Cricket</option>
                    <option value="badminton">Badminton</option>
                    <option value="football">Football</option>
                    </select><br><br>
                    <label>Favourite City:</label><br>
                    <input type="checkbox" id="city" value="New Delhi">New Delhi<br>
                    <input type="checkbox" id="city" value="Mumbai">Mumbai<br><br>
            </fieldset>
            <br>
            <input type="submit">
        </form>
    </body>
</html>
